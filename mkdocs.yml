site_name: my-agent-memory
site_description: A personal toolkit for keeping AI coding agents (mostly Copilot) usefully grounded across sessions.
site_url: https://victorfelisbino.github.io/my-agent-memory/

theme:
  name: material
  language: en
  font:
    text: Outfit
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.instant
    - header.autohide
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/link-normalize.js

nav:
  - Home: index.md
  - Start:
      - Is this for you?: should-you-use-this.md
      - Quick restart routine: quick-restart-routine.md
      - What it does: framework-purpose.md
      - What stays private: framework-scope.md
      - Principles and ways of thinking: principles-ways-of-thinking.md
  - How it works:
      - Memory adoption playbook: memory-adoption-playbook.md
      - Copilot auto-mode: copilot-auto-mode.md
  - Notes:
      - Memory ecosystem research: memory-ecosystem-research-2026-05-15.md