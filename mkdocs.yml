site_name: my-agent-memory
site_description: The quality gate for AI agent memory. Scores candidates on reusability, atomicity, novelty, and actionability — rejects the garbage before it reaches storage.
site_url: https://victorfelisbino.github.io/my-agent-memory/

theme:
  name: material
  language: en
  font:
    text: Outfit
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.instant
    - header.autohide
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/link-normalize.js

nav:
  - Home: index.md
  - The Gate:
      - How it works: the-gate.md
      - Evidence: evidence.md
  - Try It: try-it.md
  - Background:
      - Origin story: framework-purpose.md
      - Two-repo pattern: framework-scope.md
      - Memory adoption playbook: memory-adoption-playbook.md
      - Principles: principles-ways-of-thinking.md
      - Copilot auto-mode: copilot-auto-mode.md
      - Quick restart routine: quick-restart-routine.md
      - Anti-hallucination skill: anti-hallucination-skill.md
  - Status & Direction:
      - Status (what's real today): status.md
      - Roadmap: roadmap.md
      - Wave 2 signal tracker: wave-2-signal-tracker.md
      - Competence map: competence-map.md
      - Competitive landscape (May 2026): competitive-landscape-2026-05.md
      - Memory ecosystem research: memory-ecosystem-research-2026-05-15.md