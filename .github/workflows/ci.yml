name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  script-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Bash syntax
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          files=( ./**/*.sh )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No bash scripts found"
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "parse: $f"
            bash -n "$f"
          done

      - name: Validate PowerShell parse
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = Get-ChildItem -Path . -Filter *.ps1 -File -Recurse
          if (-not $files) {
            Write-Host 'No PowerShell scripts found'
            exit 0
          }
          foreach ($file in $files) {
            Write-Host "parse: $($file.FullName)"
            $null = [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$null, [ref]$null)
          }
          Write-Host 'PowerShell parse OK'

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: python -m pip install --upgrade pip mkdocs mkdocs-material

      - name: Build site (strict)
        run: python -m mkdocs build --strict

  competence-map-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Drift check
        shell: pwsh
        run: ./scripts/generate-competence-map.ps1 -CheckOnly

  admission-gate-harness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run scorer on v1 fixture
        shell: pwsh
        run: ./admission-gate/score-memory.ps1 -FailUnder 70

