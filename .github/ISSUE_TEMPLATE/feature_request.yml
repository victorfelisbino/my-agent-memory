name: Feature request
description: Propose a framework improvement
labels:
  - enhancement
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line proposal
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What pain point does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe expected behavior and command flow
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: This proposal does not require storing personal data in the framework repo.
          required: true
