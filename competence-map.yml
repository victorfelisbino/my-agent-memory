- id: admission-gate
  name: Memory admission gate (Wave 3 harness)
  depth: explore
  scope: shared
  description: Measurement harness for the quality gate that decides which memories are worth storing. v4 = 100-item labeled fixture (Wave 3 exit-criterion size, 50 keep + 50 reject); v5 = v4 + 8 contradiction-against-store items (4 contradicts, 4 reinforces) paired with a 6-anchor store fixture; plus corpus extractor and baseline stub scorer in **both PowerShell and Python** with cross-language parity enforced in CI (same fixture in, same per-item keep/reject out, with or without `-Store`). Scorer covers four dimensions (reusability, atomicity, novelty, actionability); iter 10 wired the previously-stubbed novelty dimension to a polarity + subject-overlap contradiction-against-store check (-2.0 penalty when same subject and opposite polarity vs any anchor). After ten iterations against real memory, baseline is **100/100/100 on v4 (no store)** and **108/108/108 on v5 (with store)** in both languages; 381/381 decisions match on the live real-memory corpus, with and without store. Iter 7 cleared the Wave 3 exit criterion for the first time at 91/100/82; iter 8 saturated v4 at 100/100/100; iter 9 lifted the rules into a standalone Python port; iter 10 added the contradiction-against-store check. CI gate enforces >= 85% accuracy on v4 and v5+store in both languages (15-pt headroom). Real-corpus smoke rejects 1.0% (4 of 381 items), unchanged by the iter-10 store check. No write-path integration, no dashboard, no embedding-based novelty lookup yet.
  sources:
    - admission-gate/README.md
    - admission-gate/score-memory.ps1
    - admission-gate/score_memory.py
    - admission-gate/parity-check.ps1
    - admission-gate/extract-corpus.ps1
    - admission-gate/fixtures/memories-v4.jsonl
    - admission-gate/fixtures/memories-v5.jsonl
    - admission-gate/fixtures/store-anchors.jsonl
  last_reviewed: 2026-05-26
  related:
    - ai-memory-architecture
    - thinking-principles
