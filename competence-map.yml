# Competence map for my-agent-memory (shared / public scope)
#
# Honesty contract:
# - `depth` is author-set (explore / working / expert / dormant).
# - `sources` are the files that back the claim. The generator computes evidence
#   from them (file count, total bytes, heading count, gotcha/lesson markers,
#   last git touch). If a `depth: expert` entry has zero evidence or hasn't been
#   touched in 180+ days, the generator exits non-zero.
# - `scope: shared` entries appear on the public site. `scope: personal-only`
#   entries (in the sibling personal repo) never appear here.
# - No client / project names. The generator lints for them before render.
#
# Schema (per entry):
#   id            : slug, unique within this file
#   name          : human-readable label
#   depth         : explore | working | expert | dormant
#   scope         : shared | personal-only   (this file = shared only)
#   description   : one-line summary
#   sources       : list of repo-relative paths backing the claim
#   last_reviewed : YYYY-MM-DD (author-set)
#   related       : list of other entry ids (optional)

