- id: admission-gate
  name: Memory admission gate (Wave 3 harness)
  depth: explore
  scope: shared
  description: Measurement harness for the quality gate that decides which memories are worth storing. v4 = 100-item labeled fixture (Wave 3 exit-criterion size, 50 keep + 50 reject); v5 = v4 + 8 contradiction-against-store items (4 contradicts, 4 reinforces) paired with a 6-anchor store fixture; v6 = v5 + 8 feedback-loop items (4 distinct-topic keeps, 4 paraphrase-of-recalled rejects) paired with a 4-item recalled-session fixture; plus corpus extractor and baseline stub scorer in **both PowerShell and Python** with cross-language parity enforced in CI (same fixture in, same per-item keep/reject out, with or without `-Store` / `-Recalled`). Scorer covers four dimensions (reusability, atomicity, novelty, actionability); iter 10 wired the previously-stubbed novelty dimension to a polarity + subject-overlap contradiction-against-store check (-2.0 penalty when same subject and opposite polarity vs any anchor); iter 11 extended novelty with a feedback-loop check (-2.0 penalty when same subject and same polarity AND >= 4 shared tokens vs any recalled-session item); iter 12 added a shared per-item JSON log (`-LogTo` / `--log-to`) and a static HTML dashboard (`render-dashboard.ps1`) that ingests the log and emits a single self-contained `dashboard.html` with summary tiles, top rejection reasons, and per-anchor / per-recall hit lists (gitignored; local audit tool, no server); iter 13 wired the scorer into the manual write path via `-ScoreOne` / `--score-one` (stdin JSON in, decision JSON out, exit 0 keep / 3 reject), consumed by `capture-observation.ps1` and `capture-observation.sh` so every manual capture is gated before append; iter 14 closed the auto-capture bypass by wiring the same per-candidate gate into `auto-capture-observations.ps1` and `auto-capture-observations.sh` (the volume path that runs weekly via `run-weekly-memory.ps1` and on every sync via `sync-memory.ps1`); both paths divert rejects to `observations.rejected.jsonl` (gitignored) with the reason; bypass via `-NoGate` / `--no-gate` or `MEMORY_GATE=off`. After fourteen iterations against real memory, baseline is **100/100/100 on v4 (no store)**, **108/108/108 on v5 (with store)**, and **116/116/116 on v6 (with store + recalled)** in both languages; 381/381 decisions match on the live real-memory corpus, with and without store, with and without recalled. Iter 7 cleared the Wave 3 exit criterion for the first time at 91/100/82; iter 8 saturated v4 at 100/100/100; iter 9 lifted the rules into a standalone Python port; iter 10 added the contradiction-against-store check; iter 11 added the feedback-loop check; iter 12 added the dashboard; iter 13 wired the gate into the manual write path; iter 14 closed the auto-capture bypass so the whole write path is now gated. CI gate enforces >= 85% accuracy on v4, v5+store, and v6+store+recalled in both languages (15-pt headroom), plus a dashboard smoke step, a manual-capture write-path smoke step, and an auto-capture write-path smoke step (PS gated, PS bypass, shell gated). Real-corpus smoke rejects 1.0% (4 of 381 items), unchanged by either the store check or the recalled check. The scorer now filters every real write; smarter (embedding-based) novelty lookup still pending.
  sources:
    - admission-gate/README.md
    - admission-gate/score-memory.ps1
    - admission-gate/score_memory.py
    - admission-gate/parity-check.ps1
    - admission-gate/extract-corpus.ps1
    - admission-gate/render-dashboard.ps1
    - capture-observation.ps1
    - capture-observation.sh
    - auto-capture-observations.ps1
    - auto-capture-observations.sh
    - admission-gate/fixtures/memories-v4.jsonl
    - admission-gate/fixtures/memories-v5.jsonl
    - admission-gate/fixtures/memories-v6.jsonl
    - admission-gate/fixtures/store-anchors.jsonl
    - admission-gate/fixtures/recalled-session.jsonl
  last_reviewed: 2026-05-26
  related:
    - ai-memory-architecture
    - thinking-principles
